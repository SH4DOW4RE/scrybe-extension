name: Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: extension-release
  cancel-in-progress: false

jobs:
  build-pack-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION="$(python - <<'PY'
          import json
          with open('manifest.chrome.json', 'r', encoding='utf-8') as handle:
              print(json.load(handle)['version'])
          PY
          )"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=extension-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate source
        run: |
          python -m json.tool manifest.json >/dev/null
          python -m json.tool manifest.chrome.json >/dev/null
          python -m json.tool manifest.firefox.json >/dev/null
          for file in src/*.js; do
            node --check "$file"
          done

      - name: Build browser folders
        run: sh scripts/build.sh

      - name: Package browser zips
        run: sh scripts/package.sh

      - name: Submit Chrome to Chrome Web Store
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
        run: |
          if [ -z "${CHROME_CLIENT_ID:-}" ] || [ -z "${CHROME_CLIENT_SECRET:-}" ] || [ -z "${CHROME_REFRESH_TOKEN:-}" ] || [ -z "${CHROME_EXTENSION_ID:-}" ] || [ -z "${CHROME_PUBLISHER_ID:-}" ]; then
            echo "Chrome Web Store credentials/IDs are incomplete; skipping Chrome submission." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/publish-chrome-web-store.py \
            --zip "packages/scrybe-chrome-${{ steps.version.outputs.version }}.zip" \
            --publisher-id "$CHROME_PUBLISHER_ID" \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN"
          echo "Chrome package submitted to Chrome Web Store." >> "$GITHUB_STEP_SUMMARY"

      - name: Submit Firefox to AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          FIREFOX_RELEASE_CHANNEL: ${{ vars.FIREFOX_RELEASE_CHANNEL || 'unlisted' }}
        run: |
          if [ -z "${AMO_JWT_ISSUER:-}" ] || [ -z "${AMO_JWT_SECRET:-}" ]; then
            echo "AMO_JWT_ISSUER/AMO_JWT_SECRET are not set; skipping Firefox AMO submission." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "$FIREFOX_RELEASE_CHANNEL" != "listed" ] && [ "$FIREFOX_RELEASE_CHANNEL" != "unlisted" ]; then
            echo "FIREFOX_RELEASE_CHANNEL must be listed or unlisted." >&2
            exit 1
          fi
          rm -f packages/*.xpi
          METADATA_ARGS=""
          if [ "$FIREFOX_RELEASE_CHANNEL" = "listed" ]; then
            METADATA_ARGS="--amo-metadata amo-metadata.json"
          fi
          npx --yes web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir packages \
            --channel "$FIREFOX_RELEASE_CHANNEL" \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            $METADATA_ARGS
          SIGNED_XPI="$(find packages -maxdepth 1 -type f -name '*.xpi' | sort | tail -n 1)"
          rm -f "$SIGNED_XPI"
          echo "Firefox package submitted with channel: $FIREFOX_RELEASE_CHANNEL. GitHub Release keeps the Firefox zip artifact only." >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" packages/* --clobber
          else
            gh release create "$TAG" packages/* \
              --title "Scrybe Extension ${{ steps.version.outputs.version }}" \
              --notes "Automated extension build for Scrybe ${{ steps.version.outputs.version }}."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrybe-extension-${{ steps.version.outputs.version }}
          path: |
            packages/*
